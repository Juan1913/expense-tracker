spring.application.name=ExpenseTracker

# ==================== DATASOURCE ====================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/expense_tracker}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==================== JPA ====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ==================== JWT ====================
app.jwt.secret=${JWT_SECRET:expense-tracker-secret-key-must-be-at-least-256-bits-long-for-hmac-sha256}
app.jwt.access-expiration=${JWT_ACCESS_EXPIRATION:86400000}

# ==================== ACTUATOR ====================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# ==================== SWAGGER ====================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ==================== ASYNC ====================
app.async.core-pool-size=4
app.async.max-pool-size=8
app.async.queue-capacity=100

# ==================== LOGGING ====================
logging.level.com.ExpenseTracker=DEBUG
logging.level.org.springframework.security=WARN

# ==================== SPRING AI — Chat (Groq por default, free) ====================
app.ai.chat.base-url=${AI_CHAT_BASE_URL:https://api.groq.com/openai}
app.ai.chat.api-key=${GROQ_API_KEY:your-groq-api-key-here}
app.ai.chat.model=${AI_CHAT_MODEL:llama-3.3-70b-versatile}
app.ai.chat.temperature=${AI_CHAT_TEMPERATURE:0.7}

# ==================== SPRING AI  ====================
# En el VPS, AI_EMBEDDING_BASE_URL apunta al servicio de Ollama

app.ai.embedding.base-url=${AI_EMBEDDING_BASE_URL:http://localhost:11434}
app.ai.embedding.api-key=${AI_EMBEDDING_API_KEY:ollama-not-required}
app.ai.embedding.model=${AI_EMBEDDING_MODEL:nomic-embed-text}

# Spring AI auto-config requiere algún valor; dejamos uno dummy ya que lo
# overridemos con beans manuales en AiConfig.
spring.ai.openai.api-key=disabled-use-app-ai-config

# ==================== PGVECTOR ====================
# Dimensión según embedding model: nomic-embed-text = 768,
# nv-embedqa-e5-v5 = 1024, jina-embeddings-v3 = 1024, voyage-3-lite = 512.
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.dimensions=${AI_EMBEDDING_DIM:768}
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
spring.ai.vectorstore.pgvector.index-type=HNSW

# ==================== EMAIL (Zoho SMTP) ====================
EMAIL_USER=${EMAIL_USER:tu@dominio.com}
EMAIL_PASS=${EMAIL_PASS:tu-contrasena-zoho}
EMAIL_PORT=${EMAIL_PORT:587}

# ==================== WASABI S3 ====================
app.storage.endpoint=${WASABI_ENDPOINT:https://s3.us-east-1.wasabisys.com}
app.storage.region=${WASABI_REGION:us-east-1}
app.storage.bucket=${WASABI_BUCKET:your-bucket-name}
app.storage.access-key=${WASABI_ACCESS_KEY:your-access-key}
app.storage.secret-key=${WASABI_SECRET_KEY:your-secret-key}

# ==================== FRONTEND ====================
app.frontend.url=${FRONTEND_URL:http://localhost:5173}
