spring.application.name=ExpenseTracker

# ==================== DATASOURCE ====================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/expense_tracker}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==================== JPA ====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ==================== JWT ====================
app.jwt.secret=${JWT_SECRET:expense-tracker-secret-key-must-be-at-least-256-bits-long-for-hmac-sha256}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# ==================== ACTUATOR ====================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# ==================== SWAGGER ====================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ==================== ASYNC ====================
app.async.core-pool-size=4
app.async.max-pool-size=8
app.async.queue-capacity=100

# ==================== LOGGING ====================
logging.level.com.ExpenseTracker=DEBUG
logging.level.org.springframework.security=WARN

# ==================== SPRING AI — GEMINI (OpenAI-compatible) ====================
spring.ai.openai.base-url=https://generativelanguage.googleapis.com/v1beta/openai
spring.ai.openai.api-key=${GEMINI_API_KEY:your-gemini-api-key-here}
spring.ai.openai.chat.options.model=${GEMINI_CHAT_MODEL:gemini-2.0-flash}
spring.ai.openai.embedding.options.model=${GEMINI_EMBEDDING_MODEL:text-embedding-004}

# ==================== PGVECTOR ====================
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.dimensions=768
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
spring.ai.vectorstore.pgvector.index-type=HNSW

# ==================== EMAIL (Zoho SMTP) ====================
EMAIL_USER=${EMAIL_USER:tu@dominio.com}
EMAIL_PASS=${EMAIL_PASS:tu-contrasena-zoho}
EMAIL_PORT=${EMAIL_PORT:587}

# ==================== WASABI S3 ====================
app.storage.endpoint=${WASABI_ENDPOINT:https://s3.us-east-1.wasabisys.com}
app.storage.region=${WASABI_REGION:us-east-1}
app.storage.bucket=${WASABI_BUCKET:your-bucket-name}
app.storage.access-key=${WASABI_ACCESS_KEY:your-access-key}
app.storage.secret-key=${WASABI_SECRET_KEY:your-secret-key}

# ==================== FRONTEND ====================
app.frontend.url=${FRONTEND_URL:http://localhost:5173}
